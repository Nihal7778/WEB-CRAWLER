services:
  localstack:
    image: localstack/localstack:3.8
    container_name: brightedge-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,s3,dynamodb,logs
      - DEBUG=0
      - DEFAULT_REGION=us-east-1
      - PERSISTENCE=0
    volumes:
      - "./init:/etc/localstack/init/ready.d"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: brightedge-redis
    ports:
      - "6379:6379"